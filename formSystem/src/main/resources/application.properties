spring.application.name=formSystem

# ===========================
# DATABASE - MySQL
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3307/form_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=validate
  spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ===========================
# FLYWAY
# ===========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-description=Initial_Base
# ===========================
# SPRING BOOT
# ===========================
spring.main.allow-bean-definition-overriding=true
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG